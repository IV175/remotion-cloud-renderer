name: Ultimate Cloud Video Render Engine
on:
  repository_dispatch:
    types: [trigger-video-render]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Cloning Codebase Assets
        uses: actions/checkout@v4

      - name: 🟢 Initializing Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Installing Dependencies
        run: |
          npm install

      - name: ⚙️ Compiling Video Matrices
        run: |
          mkdir -p out
          npx remotion render video-template.js HighRetentionShort out/render.mp4 --props='{"text": "${{ github.event.client_payload.text }}"}'

      - name: 🚀 Uploading Finished Video File
        uses: actions/upload-artifact@v4
        with:
          name: compiled-short-video
          path: out/render.mp4
          
